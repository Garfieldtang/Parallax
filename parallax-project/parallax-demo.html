<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>视差 | Parallax</title>
  <style>
    :root {
      --bg-color: #0A0A0A;
      --accent-color: #00D4FF;
      --text-color: #FFFFFF;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-hover: rgba(255, 255, 255, 0.08);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .screen {
      display: none;
      min-height: 100vh;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    
    .screen.active {
      display: flex;
      flex-direction: column;
    }
    
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
    }
    
    .cyan-glow {
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), 0 0 40px rgba(0, 212, 255, 0.1);
    }
    
    .btn {
      background: transparent;
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn:hover {
      background: rgba(0, 212, 255, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-color), #0099CC);
      border: none;
      color: var(--bg-color);
      font-weight: 600;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #00E5FF, var(--accent-color));
    }
    
    .input-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-color);
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }
    
    .input-box:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }
    
    .tag {
      display: inline-flex;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 6px;
    }
    
    .tag:hover {
      border-color: var(--accent-color);
      background: rgba(0, 212, 255, 0.1);
    }
    
    .tag.selected {
      background: rgba(0, 212, 255, 0.2);
      border-color: var(--accent-color);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
    }
    
    .parallax-character {
      animation: float 2.5s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    
    .typing-cursor::after {
      content: '|';
      animation: blink 0.8s infinite;
      color: var(--accent-color);
    }
    
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    
    .chat-bubble {
      max-width: 70%;
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      position: relative;
    }
    
    .chat-bubble.assistant {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 6px;
    }
    
    .chat-bubble.user {
      background: rgba(0, 212, 255, 0.2);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-bottom-right-radius: 6px;
      align-self: flex-end;
    }
    
    .avatar-small {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0, 212, 255, 0.1);
      border: 2px solid var(--accent-color);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .avatar-medium {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(0, 212, 255, 0.1);
      border: 3px solid var(--accent-color);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .constellation-line {
      position: absolute;
      background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
      height: 1px;
      opacity: 0.3;
    }
    
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--accent-color);
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    .platform-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .platform-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
    }
    
    .platform-icon.locked::after {
      content: '🔒';
      position: absolute;
      bottom: -4px;
      right: -4px;
      font-size: 10px;
    }
    
    .feedback-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .feedback-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--accent-color);
    }
    
    .feedback-btn.active-useful {
      background: rgba(76, 175, 80, 0.2);
      color: #4CAF50;
    }
    
    .feedback-btn.active-useless {
      background: rgba(244, 67, 54, 0.2);
      color: #F44336;
    }
    
    .sidebar-panel {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100vh;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--glass-border);
      padding: 20px;
      transition: right 0.3s ease;
      z-index: 100;
      overflow-y: auto;
    }
    
    .sidebar-panel.open {
      right: 0;
    }
    
    .sidebar-overlay {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      z-index: 99;
    }
    
    .sidebar-overlay.open {
      display: block;
    }
    
    .radar-chart {
      width: 200px;
      height: 200px;
      margin: 20px auto;
      position: relative;
    }
    
    .tiny-character {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 50;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .tiny-character:hover {
      transform: scale(1.1);
    }
    
    .tiny-bubble {
      position: absolute;
      right: 40px;
      bottom: 0;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }
    
    .tiny-character:hover .tiny-bubble {
      opacity: 1;
    }
    
    @media (max-width: 480px) {
      .screen {
        padding: 12px;
      }
      
      .chat-bubble {
        max-width: 85%;
      }
      
      .sidebar-panel {
        width: 100%;
        right: -100%;
      }
    }
  </style>
</head>
<body>
  <div class="stars-container" id="starsContainer"></div>

  <div class="screen" id="screenMinus1">
    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
      <div class="parallax-character" style="margin-bottom: 40px;">
        <svg width="160" height="160" viewBox="0 0 160 160" fill="none">
          <circle cx="80" cy="35" r="20" stroke="#00D4FF" stroke-width="1.5" />
          <ellipse cx="80" cy="30" rx="18" ry="10" stroke="#00D4FF" stroke-width="1.5" />
          <line x1="62" y1="30" x2="45" y2="35" stroke="#00D4FF" stroke-width="1.5" />
          <line x1="98" y1="30" x2="115" y2="35" stroke="#00D4FF" stroke-width="1.5" />
          <circle cx="72" cy="35" r="4" stroke="#00D4FF" stroke-width="1.5" />
          <circle cx="88" cy="35" r="4" stroke="#00D4FF" stroke-width="1.5" />
          <line x1="70" y1="33" x2="74" y2="37" stroke="#00D4FF" stroke-width="1" />
          <line x1="86" y1="33" x2="90" y2="37" stroke="#00D4FF" stroke-width="1" />
          <ellipse cx="80" cy="45" rx="3" ry="2" stroke="#00D4FF" stroke-width="1" />
          <line x1="50" y1="50" x2="45" y2="60" stroke="#00D4FF" stroke-width="1.5" />
          <line x1="110" y1="50" x2="115" y2="60" stroke="#00D4FF" stroke-width="1.5" />
          <path d="M60 55 Q80 80 100 55" stroke="#00D4FF" stroke-width="1.5" fill="none" />
          <ellipse cx="80" cy="85" rx="25" ry="30" stroke="#00D4FF" stroke-width="1.5" />
          <path d="M55 85 L50 70 Q70 65 80 70" stroke="#00D4FF" stroke-width="1.5" fill="none" />
          <path d="M105 85 L110 70 Q90 65 80 70" stroke="#00D4FF" stroke-width="1.5" fill="none" />
          <line x1="60" y1="95" x2="55" y2="95" stroke="#00D4FF" stroke-width="1" />
          <line x1="100" y1="95" x2="105" y2="95" stroke="#00D4FF" stroke-width="1" />
          <line x1="55" y1="85" x2="35" y2="100" stroke="#00D4FF" stroke-width="1.5" />
          <line x1="105" y1="85" x2="125" y2="100" stroke="#00D4FF" stroke-width="1.5" />
          <line x1="55" y1="115" x2="45" y2="140" stroke="#00D4FF" stroke-width="1.5" />
          <line x1="105" y1="115" x2="115" y2="140" stroke="#00D4FF" stroke-width="1.5" />
          <ellipse cx="45" cy="145" rx="8" ry="5" stroke="#00D4FF" stroke-width="1.5" />
          <ellipse cx="115" cy="145" rx="8" ry="5" stroke="#00D4FF" stroke-width="1.5" />
          <rect x="20" y="120" width="20" height="25" rx="3" stroke="#00D4FF" stroke-width="1" opacity="0.3" />
          <rect x="120" y="125" width="15" height="20" rx="2" stroke="#00D4FF" stroke-width="1" opacity="0.3" />
          <circle cx="140" cy="110" r="8" stroke="#00D4FF" stroke-width="1" opacity="0.3" />
        </svg>
      </div>
      
      <div class="glass-card" style="max-width: 420px; margin-bottom: 20px;">
        <div id="storyText" class="typing-cursor" style="font-size: 16px; line-height: 1.8; min-height: 80px;"></div>
      </div>
      
      <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
        <button class="btn" id="storySkip">跳过，直接开始</button>
        <button class="btn btn-primary" id="storyContinue" style="display: none;">继续 →</button>
        <button class="btn btn-primary" id="storyStart" style="display: none;">开始吧！</button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen0">
    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px;">
      <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: clamp(28px, 6vw, 48px); font-weight: 700; background: linear-gradient(135deg, var(--text-color), var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">视差 | Parallax</h1>
        <p style="font-size: 14px; opacity: 0.5; margin-top: 8px;">Change your angle, change your world.</p>
      </div>
      
      <div style="display: flex; gap: 16px; margin-bottom: 24px; align-items: flex-start;">
        <div class="avatar-medium">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="15" r="10" stroke="#00D4FF" stroke-width="1.5" />
            <ellipse cx="20" cy="12" rx="9" ry="5" stroke="#00D4FF" stroke-width="1.5" />
            <circle cx="16" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
            <circle cx="24" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
            <path d="M18 20 Q20 22 22 20" stroke="#00D4FF" stroke-width="1" fill="none" />
            <path d="M15 25 Q20 30 25 25" stroke="#00D4FF" stroke-width="1.5" fill="none" />
          </svg>
        </div>
        <div class="glass-card" style="flex: 1; max-width: 360px;">
          <p style="font-size: 15px;">你好，我是小差。先告诉我，你最近在研究什么？</p>
        </div>
      </div>
      
      <div style="width: 100%; max-width: 440px;">
        <div style="display: flex; gap: 10px;">
          <input type="text" id="observerInput" class="input-box" placeholder="比如：我在学前端开发…" style="flex: 1;" />
          <button class="btn btn-primary" onclick="handleStart()">开始</button>
        </div>
        
        <div style="margin-top: 30px; text-align: center;">
          <p style="font-size: 12px; opacity: 0.5; margin-bottom: 16px;">🔗 授权后，视差可结合你的关注列表生成更精准的推荐。</p>
          <div style="display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;">
            <div class="platform-icon locked" onclick="showPlatformComingSoon('B站')" title="B站">
              <span>📺</span>
            </div>
            <div class="platform-icon locked" onclick="showPlatformComingSoon('小红书')" title="小红书">
              <span>📕</span>
            </div>
            <div class="platform-icon locked" onclick="showPlatformComingSoon('抖音')" title="抖音">
              <span>🎵</span>
            </div>
            <div class="platform-icon locked" onclick="showPlatformComingSoon('知乎')" title="知乎">
              <span>📖</span>
            </div>
            <div class="platform-icon locked" onclick="showPlatformComingSoon('豆瓣')" title="豆瓣">
              <span>📚</span>
            </div>
            <div class="platform-icon locked" onclick="showPlatformComingSoon('微信')" title="微信">
              <span>💬</span>
            </div>
            <div class="platform-icon locked" onclick="showPlatformComingSoon('知识库')" title="知识库">
              <span>🧠</span>
            </div>
          </div>
        </div>
      </div>
      
      <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); opacity: 0.2; font-size: 12px;">视差 | Parallax</div>
    </div>
  </div>

  <div class="screen" id="screen1">
    <div style="flex: 1;">
      <div style="display: flex; gap: 12px; margin-bottom: 24px; align-items: flex-start;">
        <div class="avatar-small">
          <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="15" r="10" stroke="#00D4FF" stroke-width="1.5" />
            <circle cx="16" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
            <circle cx="24" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
            <path d="M18 20 Q20 22 22 20" stroke="#00D4FF" stroke-width="1" fill="none" />
          </svg>
        </div>
        <div class="glass-card">
          <p style="font-size: 14px;">好诶！那……你最近在研究什么呢？</p>
        </div>
      </div>
      
      <div id="fieldTags" style="display: flex; flex-wrap: wrap; margin-bottom: 24px;"></div>
      
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <button class="btn" onclick="refreshFields()">↻ 换一批</button>
        <button class="btn btn-primary" id="confirmFieldBtn" disabled onclick="confirmField()">确认</button>
      </div>
    </div>
    
    <div class="tiny-character" style="margin-bottom: 80px;">
      <div class="avatar-small" style="border-width: 2px;">
        <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="15" r="10" stroke="#00D4FF" stroke-width="1.5" />
          <circle cx="16" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
          <circle cx="24" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
          <path d="M18 20 Q20 22 22 20" stroke="#00D4FF" stroke-width="1" fill="none" />
        </svg>
      </div>
      <div class="tiny-bubble">选一个你最感兴趣的就好，聚焦才能深入。</div>
    </div>
  </div>

  <div class="screen" id="screen2">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <button class="btn" onclick="goToScreen(1)" style="padding: 8px 16px;">← 返回</button>
      <div style="text-align: center;">
        <span style="color: var(--accent-color); font-weight: 600;">小差</span>
        <span style="opacity: 0.5; font-size: 13px;"> · </span>
        <span id="currentFieldName" style="font-size: 13px;">--</span>
      </div>
      <span style="font-size: 13px; opacity: 0.5;">第 <span id="exploreCount">1</span> 次探索</span>
    </div>
    
    <div id="chatMessages" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding-bottom: 100px;"></div>
    
    <div style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); padding: 12px 20px; padding-bottom: calc(12px + env(safe-area-inset-bottom));">
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="text" id="chatInput" class="input-box" placeholder="输入你的回答..." style="flex: 1;" onkeydown="if(event.key === 'Enter') sendMessage()" />
        <button class="btn btn-primary" onclick="sendMessage()">→</button>
      </div>
      <div style="display: flex; justify-content: flex-end;">
        <button class="btn btn-primary" id="goExploreBtn" style="display: none; background: linear-gradient(135deg, #00D4FF, #00FF88);" onclick="goToScreen(3)">🚀 出发吧！</button>
      </div>
    </div>
    
    <div class="tiny-character" onclick="resetChat()">
      <div class="avatar-small" style="border-width: 2px;">
        <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="15" r="10" stroke="#00D4FF" stroke-width="1.5" />
          <circle cx="16" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
          <circle cx="24" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
          <path d="M18 20 Q20 22 22 20" stroke="#00D4FF" stroke-width="1" fill="none" />
        </svg>
      </div>
      <div class="tiny-bubble">需要我换个话题吗？😊</div>
    </div>
  </div>

  <div class="screen" id="screen3">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <span style="font-weight: 600; font-size: 16px;">视差 | Parallax</span>
      <span style="font-size: 14px;">观测者：<span id="observerNameDisplay">--</span></span>
      <span style="font-size: 13px; opacity: 0.5;">第 <span id="exploreCountDisplay">1</span> 次探索</span>
    </div>
    
    <div id="mainMessages" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding-bottom: 120px;"></div>
    
    <div style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); padding: 12px 20px; padding-bottom: calc(12px + env(safe-area-inset-bottom));">
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="text" id="mainInput" class="input-box" placeholder="输入你想聊的新话题..." style="flex: 1;" onkeydown="if(event.key === 'Enter') sendMainMessage()" />
        <button class="btn btn-primary" onclick="sendMainMessage()">→</button>
      </div>
      <div style="display: flex; justify-content: center; gap: 12px;">
        <button class="btn" onclick="recommendNewField()">🔄 推荐新领域</button>
        <button class="btn" onclick="showAbilitySpectrum()">📊 查看能力光谱</button>
        <button class="btn" onclick="showApiConfig()">⚙️ 自定义API</button>
      </div>
    </div>
    
    <div class="tiny-character" onclick="quickStartChat()">
      <div class="avatar-small" style="border-width: 2px;">
        <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="15" r="10" stroke="#00D4FF" stroke-width="1.5" />
          <circle cx="16" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
          <circle cx="24" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
          <path d="M18 20 Q20 22 22 20" stroke="#00D4FF" stroke-width="1" fill="none" />
        </svg>
      </div>
      <div class="tiny-bubble">输入你想聊的新话题...</div>
    </div>
  </div>

  <div class="sidebar-panel" id="abilityPanel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 style="font-size: 18px;">能力光谱</h3>
      <button class="btn" style="padding: 4px 12px;" onclick="hideAbilitySpectrum()">✕</button>
    </div>
    <div id="historyList" style="margin-bottom: 20px;"></div>
    <div id="traitsDisplay" style="margin-bottom: 20px;"></div>
    <div class="radar-chart" id="radarChart"></div>
  </div>
  
  <div class="sidebar-overlay" id="abilityOverlay" onclick="hideAbilitySpectrum()"></div>

  <div class="glass-card" id="apiConfigModal" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 200; max-width: 360px;">
    <h3 style="font-size: 16px; margin-bottom: 16px;">⚙️ 自定义API</h3>
    <input type="text" id="apiKeyInput" class="input-box" placeholder="DeepSeek API Key..." style="width: 100%; margin-bottom: 16px;" />
    <div style="display: flex; gap: 10px; justify-content: flex-end;">
      <button class="btn" onclick="hideApiConfig()">取消</button>
      <button class="btn btn-primary" onclick="saveApiKey()">保存</button>
    </div>
  </div>
  
  <div class="sidebar-overlay" id="apiOverlay" onclick="hideApiConfig()" style="z-index: 199;"></div>

  <div id="toast" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s ease;"></div>

  <script>
    const USE_MOCK = false;
    const DEFAULT_API_KEY = 'sk-b0b6dc1759634e91bbff11af739fbf35';
    
    const ALL_FIELDS = [
      '前端开发', '后端开发', '人工智能', '机器学习', '深度学习', '计算机视觉',
      '自然语言处理', '数据科学', '大数据', '云计算', '分布式系统', '微服务',
      '系统架构', '产品设计', '用户体验', '交互设计', '平面设计', '品牌设计',
      '心理学', '认知科学', '神经科学', '行为经济学', '经济学', '金融学',
      '历史研究', '社会学', '哲学', '文学创作', '音乐制作', '影视制作',
      '游戏设计', '虚拟现实', '区块链', '密码学', '网络安全', '软件工程',
      '测试开发', '运维工程', 'DevOps', '敏捷开发', '编程语言', '算法',
      '数据结构', '数据库', '网络协议', '操作系统', '编译原理', '计算机组成'
    ];
    
    const state = {
      observerName: '',
      currentField: '',
      chatHistory: [],
      evaluations: [],
      bilibiliAuthorized: false,
      bilibiliData: {
        following: [],
        followingTags: [],
        lastUpdated: null
      },
      exploreCount: 1,
      lastExploreTime: null,
      storySeen: false,
      apiKey: '',
      storyScene: 0
    };

    function init() {
      loadState();
      createStars();
      
      if (!state.storySeen) {
        goToScreen(-1);
      } else if (state.observerName && state.evaluations.length > 0) {
        goToScreen(3);
      } else if (state.observerName) {
        goToScreen(1);
      } else {
        goToScreen(0);
      }
    }

    function goToScreen(screenNum) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const screenId = screenNum === -1 ? 'screenMinus1' : `screen${screenNum}`;
      document.getElementById(screenId).classList.add('active');
      
      if (screenNum === 1) renderFields();
      if (screenNum === 2) startChat();
      if (screenNum === 3) renderMainPage();
    }

    function createStars() {
      const container = document.getElementById('starsContainer');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        star.style.width = Math.random() * 3 + 2 + 'px';
        star.style.height = star.style.width;
        container.appendChild(star);
      }
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.opacity = 1;
      setTimeout(() => toast.style.opacity = 0, 3000);
    }

    function loadState() {
      try {
        const saved = localStorage.getItem('parallax_data');
        if (saved) {
          const data = JSON.parse(saved);
          Object.assign(state, data);
        }
        state.storySeen = localStorage.getItem('parallax_story_seen') === 'true';
      } catch (e) {
        console.error('加载状态失败:', e);
      }
    }

    function saveState() {
      try {
        localStorage.setItem('parallax_data', JSON.stringify(state));
        localStorage.setItem('parallax_story_seen', state.storySeen ? 'true' : 'false');
      } catch (e) {
        console.error('保存状态失败:', e);
      }
    }

    let storyTypingInterval = null;
    function startStory() {
      state.storyScene = 0;
      renderStoryScene();
    }

    function renderStoryScene() {
      const textElement = document.getElementById('storyText');
      const continueBtn = document.getElementById('storyContinue');
      const startBtn = document.getElementById('storyStart');
      const skipBtn = document.getElementById('storySkip');
      
      textElement.innerHTML = '';
      continueBtn.style.display = 'none';
      startBtn.style.display = 'none';
      skipBtn.style.display = 'inline-flex';
      
      const scenes = [
        "我以前是这样的：打开APP → 刷 → 刷 → 刷 → 关掉。然后问自己：我刚才看了什么？答不上来。",
        "后来我意识到：不是我不够努力。是算法太努力了——拼命让我待在舒适区里。我喜欢的，它拼命给我；我没见过的，它连提都不提。",
        "所以我做了这个工具。不帮你整理收藏夹，不帮你做笔记。只回答一个问题：你今天刷了这么多，下一步到底该往哪走？"
      ];
      
      if (state.storyScene < 2) {
        typeWriter(scenes[state.storyScene], () => {
          continueBtn.style.display = 'inline-flex';
        });
      } else {
        textElement.textContent = scenes[state.storyScene];
        startBtn.style.display = 'inline-flex';
        skipBtn.style.display = 'none';
      }
    }

    function typeWriter(text, callback) {
      const element = document.getElementById('storyText');
      let i = 0;
      element.innerHTML = '';
      
      if (storyTypingInterval) clearInterval(storyTypingInterval);
      
      storyTypingInterval = setInterval(() => {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
        } else {
          clearInterval(storyTypingInterval);
          if (callback) callback();
        }
      }, 30);
    }

    function storyContinue() {
      state.storyScene++;
      renderStoryScene();
    }

    function storyStart() {
      state.storySeen = true;
      saveState();
      goToScreen(0);
    }

    function storySkip() {
      state.storySeen = true;
      saveState();
      goToScreen(0);
    }

    function handleStart() {
      const name = document.getElementById('observerInput').value.trim();
      if (!name) {
        showToast('请输入你的名字');
        return;
      }
      state.observerName = name;
      saveState();
      goToScreen(1);
    }

    function renderFields() {
      const container = document.getElementById('fieldTags');
      container.innerHTML = '';
      
      const shuffled = [...ALL_FIELDS].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, 24);
      
      selected.forEach(field => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.textContent = field;
        tag.onclick = () => selectField(tag, field);
        container.appendChild(tag);
      });
      
      document.getElementById('confirmFieldBtn').disabled = true;
    }

    function selectField(tagElement, fieldName) {
      document.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
      tagElement.classList.add('selected');
      state.currentField = fieldName;
      document.getElementById('confirmFieldBtn').disabled = false;
    }

    function refreshFields() {
      renderFields();
    }

    function confirmField() {
      if (!state.currentField) return;
      goToScreen(2);
    }

    function startChat() {
      state.chatHistory = [];
      document.getElementById('chatMessages').innerHTML = '';
      document.getElementById('currentFieldName').textContent = state.currentField;
      document.getElementById('exploreCount').textContent = state.exploreCount;
      document.getElementById('goExploreBtn').style.display = 'none';
      
      addAssistantMessage('先请你介绍一下自己的基本情况吧，比如学历、年龄、职业、专业啥的~');
    }

    function addAssistantMessage(text) {
      const container = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.style.display = 'flex';
      messageDiv.style.gap = '12px';
      
      messageDiv.innerHTML = `
        <div class="avatar-small">
          <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="15" r="10" stroke="#00D4FF" stroke-width="1.5" />
            <circle cx="16" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
            <circle cx="24" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
            <path d="M18 20 Q20 22 22 20" stroke="#00D4FF" stroke-width="1" fill="none" />
          </svg>
        </div>
        <div class="chat-bubble assistant">${text}</div>
      `;
      
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
      state.chatHistory.push({ role: 'assistant', content: text });
    }

    function addUserMessage(text) {
      const container = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.style.display = 'flex';
      messageDiv.style.gap = '12px';
      messageDiv.style.justifyContent = 'flex-end';
      
      messageDiv.innerHTML = `
        <div class="chat-bubble user"><span style="opacity: 0.7;">我：</span>${text}</div>
      `;
      
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
      state.chatHistory.push({ role: 'user', content: text });
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      addUserMessage(text);
      
      if (state.chatHistory.length >= 6) {
        document.getElementById('goExploreBtn').style.display = 'inline-flex';
        return;
      }
      
      const nextQuestion = await generateNextQuestion(text);
      addAssistantMessage(nextQuestion);
      
      if (state.chatHistory.length >= 6) {
        document.getElementById('goExploreBtn').style.display = 'inline-flex';
      }
    }

    async function generateNextQuestion(userInput) {
      if (USE_MOCK) {
        const mockQuestions = [
          '很好奇，你是怎么接触到这个领域的呢？',
          '那在学习过程中，你觉得最有趣的部分是什么？',
          '有没有遇到过什么特别难理解的概念？',
          '如果让你推荐一个入门资源，你会选什么？',
          '你觉得这个领域未来会怎么发展？'
        ];
        const idx = Math.min(state.chatHistory.length / 2, mockQuestions.length - 1);
        await new Promise(r => setTimeout(r, 500));
        return mockQuestions[Math.floor(idx)];
      }
      
      try {
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${state.apiKey || DEFAULT_API_KEY}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [{
              role: 'system',
              content: `你是小差，一个亲切的认知向导。用户正在研究${state.currentField}领域。请以朋友的口吻进行苏格拉底式追问，帮助用户深入思考。每次只问一个问题，不要超过30个字。`
            }, ...state.chatHistory.slice(-4), { role: 'user', content: userInput }],
            max_tokens: 50
          })
        });
        
        const data = await response.json();
        if (data.choices && data.choices[0] && data.choices[0].message) {
          return data.choices[0].message.content;
        }
      } catch (e) {
        console.error('API调用失败:', e);
      }
      
      const fallbackQuestions = [
        '很好奇，你是怎么接触到这个领域的呢？',
        '那在学习过程中，你觉得最有趣的部分是什么？',
        '有没有遇到过什么特别难理解的概念？',
        '如果让你推荐一个入门资源，你会选什么？',
        '你觉得这个领域未来会怎么发展？'
      ];
      return fallbackQuestions[Math.floor(Math.random() * fallbackQuestions.length)];
    }

    function resetChat() {
      if (confirm('确定要重新开始对话吗？')) {
        startChat();
      }
    }

    async function renderMainPage() {
      const container = document.getElementById('mainMessages');
      container.innerHTML = '';
      
      document.getElementById('observerNameDisplay').textContent = state.observerName;
      document.getElementById('exploreCountDisplay').textContent = state.exploreCount;
      
      if (state.evaluations.length > 0) {
        const lastEval = state.evaluations[state.evaluations.length - 1];
        addMainMessage(`根据刚才的对话，我帮你找到了这些方向 ——`);
        
        addDeepRecommendations(lastEval.deepRecs);
        addBridgeRecommendations(lastEval.bridgeRecs);
        
        addMainMessage('这些方向里有你感兴趣的吗？或者我们可以换个新领域聊聊 😊');
      } else {
        addMainMessage(`你好${state.observerName}，我是小差！今天想聊点什么？`);
      }
    }

    function addMainMessage(text) {
      const container = document.getElementById('mainMessages');
      const messageDiv = document.createElement('div');
      messageDiv.style.display = 'flex';
      messageDiv.style.gap = '12px';
      
      messageDiv.innerHTML = `
        <div class="avatar-small">
          <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="15" r="10" stroke="#00D4FF" stroke-width="1.5" />
            <circle cx="16" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
            <circle cx="24" cy="15" r="2" stroke="#00D4FF" stroke-width="1.5" />
            <path d="M18 20 Q20 22 22 20" stroke="#00D4FF" stroke-width="1" fill="none" />
          </svg>
        </div>
        <div class="chat-bubble assistant">${text}</div>
      `;
      
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
    }

    function addDeepRecommendations(recs) {
      const container = document.getElementById('mainMessages');
      recs.forEach((rec, idx) => {
        const recDiv = document.createElement('div');
        recDiv.style.display = 'flex';
        recDiv.style.gap = '12px';
        
        recDiv.innerHTML = `
          <div class="avatar-small">📌</div>
          <div class="chat-bubble assistant">
            <strong>${rec.title}</strong><br>
            ${rec.description}<br>
            <span style="opacity: 0.6; font-size: 12px;">推荐理由：${rec.reason}</span><br>
            <div style="margin-top: 8px;">
              <button class="feedback-btn" onclick="handleFeedback(this, 'useful')">👍 有用</button>
              <button class="feedback-btn" onclick="handleFeedback(this, 'useless')">👎 无用</button>
            </div>
          </div>
        `;
        
        container.appendChild(recDiv);
      });
    }

    function addBridgeRecommendations(recs) {
      const container = document.getElementById('mainMessages');
      recs.forEach((rec, idx) => {
        const recDiv = document.createElement('div');
        recDiv.style.display = 'flex';
        recDiv.style.gap = '12px';
        
        recDiv.innerHTML = `
          <div class="avatar-small">🌉</div>
          <div class="chat-bubble assistant">
            <strong>${rec.title}</strong><br>
            ${rec.description}<br>
            <span style="opacity: 0.6; font-size: 12px;">桥接逻辑：${rec.bridgeLogic}</span><br>
            <div style="margin-top: 8px;">
              <button class="feedback-btn" onclick="handleFeedback(this, 'useful')">👍 有用</button>
              <button class="feedback-btn" onclick="handleFeedback(this, 'useless')">👎 无用</button>
            </div>
          </div>
        `;
        
        container.appendChild(recDiv);
      });
    }

    function handleFeedback(btn, type) {
      const parent = btn.parentElement;
      parent.querySelectorAll('.feedback-btn').forEach(b => {
        b.classList.remove('active-useful', 'active-useless');
      });
      btn.classList.add(type === 'useful' ? 'active-useful' : 'active-useless');
    }

    async function sendMainMessage() {
      const input = document.getElementById('mainInput');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      
      const container = document.getElementById('mainMessages');
      const userDiv = document.createElement('div');
      userDiv.style.display = 'flex';
      userDiv.style.gap = '12px';
      userDiv.style.justifyContent = 'flex-end';
      userDiv.innerHTML = `<div class="chat-bubble user"><span style="opacity: 0.7;">我：</span>${text}</div>`;
      container.appendChild(userDiv);
      container.scrollTop = container.scrollHeight;
      
      await generateEvaluation(text);
    }

    async function generateEvaluation(userInput = '') {
      if (USE_MOCK) {
        await new Promise(r => setTimeout(r, 1000));
        saveEvaluation(getMockEvaluation());
        renderMainPage();
        return;
      }
      
      try {
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${state.apiKey || DEFAULT_API_KEY}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [{
              role: 'system',
              content: `你是小差，一个认知向导。用户正在研究${state.currentField}领域。请根据对话历史生成推荐。
              输出格式：JSON格式，包含deepRecs和bridgeRecs两个数组。
              deepRecs数组每个元素包含：title, description, reason
              bridgeRecs数组每个元素包含：title, description, bridgeLogic`
            }, ...state.chatHistory, { role: 'user', content: userInput || '总结推荐' }],
            max_tokens: 1500
          })
        });
        
        const data = await response.json();
        if (data.choices && data.choices[0] && data.choices[0].message) {
          const content = data.choices[0].message.content;
          const jsonMatch = content.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            const evalData = JSON.parse(jsonMatch[0]);
            saveEvaluation({
              date: new Date().toISOString(),
              field: state.currentField,
              dimensions: getMockDimensions(),
              traits: '系统思维',
              deepRecs: evalData.deepRecs || getMockDeepRecs(),
              bridgeRecs: evalData.bridgeRecs || getMockBridgeRecs()
            });
            renderMainPage();
            return;
          }
        }
      } catch (e) {
        console.error('生成推荐失败:', e);
      }
      
      saveEvaluation(getMockEvaluation());
      renderMainPage();
    }

    function getMockEvaluation() {
      return {
        date: new Date().toISOString(),
        field: state.currentField,
        dimensions: getMockDimensions(),
        traits: '系统思维',
        deepRecs: getMockDeepRecs(),
        bridgeRecs: getMockBridgeRecs()
      };
    }

    function getMockDimensions() {
      return {
        '逻辑分析': Math.round(6 + Math.random() * 3),
        '感性直觉': Math.round(5 + Math.random() * 4),
        '系统构建': Math.round(6 + Math.random() * 3),
        '表达叙事': Math.round(5 + Math.random() * 4),
        '实证探究': Math.round(5 + Math.random() * 4),
        '审美创造': Math.round(4 + Math.random() * 4)
      };
    }

    function getMockDeepRecs() {
      return [
        { title: '深入理解浏览器渲染原理', description: '从HTML解析到像素渲染的完整流程', reason: '帮助你理解前端性能优化的底层原理' },
        { title: 'JavaScript高级特性精讲', description: '闭包、原型链、异步编程深入剖析', reason: '夯实JS基础，提升代码质量' }
      ];
    }

    function getMockBridgeRecs() {
      return [
        { title: '认知心理学', description: '学习大脑如何处理信息和决策', bridgeLogic: '编程中的逻辑思维与认知心理学共享相同的信息处理模型' },
        { title: '建筑设计', description: '学习空间结构与系统设计', bridgeLogic: '软件架构与建筑设计都是系统层面的结构化思考' }
      ];
    }

    function saveEvaluation(evalData) {
      state.evaluations.push(evalData);
      state.exploreCount++;
      state.lastExploreTime = new Date().toISOString();
      saveState();
    }

    async function recommendNewField() {
      addMainMessage('让我分析一下你的兴趣模型...');
      
      await new Promise(r => setTimeout(r, 1000));
      
      const recommendedFields = [
        { name: '认知科学', reason: '你的系统思维很强，认知科学能帮你理解思维的底层机制' },
        { name: '经济学', reason: '编程中的优化思维与经济学的资源分配逻辑相通' },
        { name: '设计美学', reason: '好的代码也需要美感，设计思维能提升你的产品感' }
      ];
      
      let msg = '根据你的兴趣模型，我猜你可能会对这些领域感兴趣：\n\n';
      recommendedFields.forEach(f => {
        msg += `• **${f.name}** — ${f.reason}\n`;
      });
      msg += '\n想试试哪个？';
      
      addMainMessage(msg);
    }

    function showAbilitySpectrum() {
      document.getElementById('abilityPanel').classList.add('open');
      document.getElementById('abilityOverlay').classList.add('open');
      
      renderHistoryList();
      renderTraits();
      renderRadarChart();
    }

    function hideAbilitySpectrum() {
      document.getElementById('abilityPanel').classList.remove('open');
      document.getElementById('abilityOverlay').classList.remove('open');
    }

    function renderHistoryList() {
      const container = document.getElementById('historyList');
      container.innerHTML = '<h4 style="font-size: 14px; margin-bottom: 12px;">历史探索记录</h4>';
      
      if (state.evaluations.length === 0) {
        container.innerHTML += '<p style="opacity: 0.5; font-size: 13px;">暂无探索记录</p>';
        return;
      }
      
      state.evaluations.slice().reverse().forEach((evalData, idx) => {
        const date = new Date(evalData.date);
        const dateStr = `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
        
        const item = document.createElement('div');
        item.className = 'glass-card';
        item.style.marginBottom = '10px';
        item.innerHTML = `
          <div style="display: flex; justify-content: space-between;">
            <span style="color: var(--accent-color); font-weight: 500;">${evalData.field}</span>
            <span style="font-size: 12px; opacity: 0.5;">${dateStr}</span>
          </div>
        `;
        
        container.appendChild(item);
      });
    }

    function renderTraits() {
      const container = document.getElementById('traitsDisplay');
      container.innerHTML = '<h4 style="font-size: 14px; margin-bottom: 12px;">能力特质</h4>';
      
      const traits = [
        { name: '系统思维', score: 85 },
        { name: '逻辑分析', score: 78 },
        { name: '创新思维', score: 72 },
        { name: '学习能力', score: 82 }
      ];
      
      traits.forEach(trait => {
        const div = document.createElement('div');
        div.style.marginBottom = '8px';
        
        div.innerHTML = `
          <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
            <span style="font-size: 13px;">${trait.name}</span>
            <span style="font-size: 13px; color: var(--accent-color);">${trait.score}%</span>
          </div>
          <div style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
            <div style="height: 100%; width: ${trait.score}%; background: linear-gradient(90deg, var(--accent-color), #00FF88);"></div>
          </div>
        `;
        
        container.appendChild(div);
      });
    }

    function renderRadarChart() {
      const canvas = document.createElement('canvas');
      canvas.width = 200;
      canvas.height = 200;
      const ctx = canvas.getContext('2d');
      
      const dimensions = ['逻辑分析', '感性直觉', '系统构建', '表达叙事', '实证探究', '审美创造'];
      const values = state.evaluations.length > 0 
        ? Object.values(state.evaluations[state.evaluations.length - 1].dimensions)
        : [5, 5, 5, 5, 5, 5];
      
      const centerX = 100;
      const centerY = 100;
      const radius = 80;
      
      ctx.clearRect(0, 0, 200, 200);
      
      for (let i = 1; i <= 5; i++) {
        ctx.beginPath();
        const r = (radius / 5) * i;
        for (let j = 0; j < 6; j++) {
          const angle = (Math.PI * 2 / 6) * j - Math.PI / 2;
          const x = centerX + r * Math.cos(angle);
          const y = centerY + r * Math.sin(angle);
          if (j === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + radius * Math.cos(angle), centerY + radius * Math.sin(angle));
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.stroke();
      }
      
      ctx.beginPath();
      values.forEach((val, i) => {
        const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
        const r = (val / 10) * radius;
        const x = centerX + r * Math.cos(angle);
        const y = centerY + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fillStyle = 'rgba(0, 212, 255, 0.2)';
      ctx.fill();
      ctx.strokeStyle = '#00D4FF';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      values.forEach((val, i) => {
        const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
        const r = (val / 10) * radius;
        const x = centerX + r * Math.cos(angle);
        const y = centerY + r * Math.sin(angle);
        
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#00D4FF';
        ctx.fill();
        
        const labelAngle = (Math.PI * 2 / 6) * i - Math.PI / 2;
        const labelR = radius + 20;
        const labelX = centerX + labelR * Math.cos(labelAngle);
        const labelY = centerY + labelR * Math.sin(labelAngle);
        
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(dimensions[i], labelX, labelY);
      });
      
      const container = document.getElementById('radarChart');
      container.innerHTML = '';
      container.appendChild(canvas);
    }

    function showApiConfig() {
      document.getElementById('apiConfigModal').style.display = 'block';
      document.getElementById('apiOverlay').classList.add('open');
      document.getElementById('apiKeyInput').value = state.apiKey;
    }

    function hideApiConfig() {
      document.getElementById('apiConfigModal').style.display = 'none';
      document.getElementById('apiOverlay').classList.remove('open');
    }

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      state.apiKey = key;
      saveState();
      hideApiConfig();
      showToast('API Key 已保存');
    }

    function quickStartChat() {
      goToScreen(1);
    }

    function showPlatformComingSoon(name) {
      showToast(`${name}授权功能开发中，未来将支持！`);
    }

    document.getElementById('storyContinue').onclick = storyContinue;
    document.getElementById('storyStart').onclick = storyStart;
    document.getElementById('storySkip').onclick = storySkip;

    init();
  </script>
